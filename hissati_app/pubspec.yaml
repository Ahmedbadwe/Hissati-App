name: hissati
description: "Hissati (حصتي) - Egyptian Educational Marketplace connecting tutors and parents"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # Firebase (Using 'any' for versions to let Flutter resolve conflicts between geoflutterfire2 and others)
  firebase_core: any
  firebase_auth: any
  cloud_firestore: any
  cloud_functions: any

  # State management
  provider: ^6.1.2

  # Location & Maps
  geolocator: ^13.0.1
  geocoding: ^3.0.0
  geoflutterfire2: ^2.3.15
  google_maps_flutter: ^2.9.0

  # Launchers (phone dialer / WhatsApp deep link)
  url_launcher: ^6.3.1

  # UI helpers
  intl: ^0.19.0
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  pin_code_fields: ^8.0.1
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
