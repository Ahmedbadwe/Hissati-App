name: Build Android App Bundle

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build Android App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Get Flutter Dependencies
        run: cd hissati_app && flutter pub get

      - name: Build Android App Bundle (AAB)
        run: cd hissati_app && flutter build appbundle --release

      - name: Upload Final App Bundle
        uses: actions/upload-artifact@v4
        with:
          name: Hissati-App-Final
          path: hissati_app/build/app/outputs/bundle/release/app-release.aab
          retention-days: 7
